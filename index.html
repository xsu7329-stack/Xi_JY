        <a href="javascript:void(0);" class="btn" onclick="Telegram.WebApp.openLink('https://t.me/gamee')">🎮 进入官方娱乐中心</a>
        <a href="javascript:void(0);" class="btn" onclick="Telegram.WebApp.showAlert('正在读取实时汇率...')">📊 实时业务监测</a>
        <a href="https://t.me/YOUR_OFFICIAL_ID" class="btn btn-gold">🎧 24H 商务支持</a>
